<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamal Abou Mahmoud - Digital Visiting Card</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: min(92%, 430px);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      overflow: hidden;
      text-align: center;
      border-top: 12px solid #ffcc00;
    }
    .logo {
      margin: 30px auto 16px;
      background: #ffcc00;
      color: #111;
      font-weight: 800;
      font-size: 34px;
      padding: 12px 34px;
      border-radius: 28px;
      display: inline-block;
      letter-spacing: 1px;
    }
    h1 {
      margin: 10px 24px 6px;
      font-size: 28px;
      line-height: 1.2;
    }
    .title {
      font-size: 18px;
      color: #555;
      margin: 0 26px 6px;
      line-height: 1.4;
    }
    .company {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 26px;
    }
    .info {
      padding: 0 30px 26px;
      text-align: left;
      line-height: 1.7;
      font-size: 16px;
    }
    .label {
      color: #666;
      font-size: 13px;
      text-transform: uppercase;
      margin-top: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .value { overflow-wrap: anywhere; }
    .button {
      display: block;
      margin: 0 30px 14px;
      padding: 15px 18px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 17px;
    }
    .email-button {
      background: #111;
      margin-bottom: 32px;
    }
    .footer {
      font-size: 12px;
      color: #777;
      padding-bottom: 24px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">MTN</div>
    <h1>Kamal Abou Mahmoud</h1>
    <div class="title">Director: Information Technology</div>
    <div class="company">MTN Syria</div>

    <section class="info">
      <div class="label">Mobile / WhatsApp</div>
      <div class="value">+963944222997</div>
      <div class="label">Email</div>
      <div class="value">kmahmoud@mtn.com.sy</div>
    </section>

    <a class="button" href="https://wa.me/963944222997" target="_blank" rel="noopener">
      Open WhatsApp Chat
    </a>

    <a class="button email-button" href="mailto:kmahmoud@mtn.com.sy">
      Send Email
    </a>

    <div class="footer">Digital Visiting Card</div>
  </main>
</body>
</html>
